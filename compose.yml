services:
  postgres:
    image: postgres:18.3
    container_name: bisql-example-postgres
    environment:
      POSTGRES_DB: bisql_example
      POSTGRES_USER: bisql
      POSTGRES_PASSWORD: bisql
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bisql -d bisql_example"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql

volumes:
  postgres-data:
